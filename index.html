
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💥 炫炮找零・亮眼枚數版 💰</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 10%, #0b0d1e, #010101);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* 酷炫霓虹玻璃容器 */
        .neon-box {
            background: rgba(18, 22, 40, 0.75);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 2px solid rgba(0, 255, 255, 0.25);
            border-radius: 56px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8),
                        0 0 30px rgba(0, 255, 255, 0.5),
                        inset 0 0 20px rgba(255, 255, 255, 0.1);
            padding: 32px 28px;
            width: 100%;
            max-width: 680px;
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(135deg, #a0f0ff, #ff7bff, #ffe570);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
            text-shadow: 0 0 15px cyan, 0 0 30px magenta;
            margin-bottom: 8px;
        }

        .sub {
            text-align: center;
            color: #b0f0ff;
            font-size: 1.1rem;
            margin-bottom: 28px;
            font-style: italic;
            text-shadow: 0 0 5px cyan;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.2);
            padding-bottom: 10px;
        }

        /* 金額輸入區 */
        .input-area {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: rgba(0, 255, 255, 0.05);
            border-radius: 120px;
            padding: 12px 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(0, 255, 200, 0.4);
            box-shadow: 0 0 15px rgba(0, 255, 200, 0.3);
        }

        .input-area label {
            color: #b6fff2;
            font-weight: 600;
            font-size: 1.3rem;
            text-shadow: 0 0 8px cyan;
        }

        .input-area input {
            background: rgba(10, 20, 30, 0.8);
            border: none;
            border-radius: 60px;
            padding: 14px 24px;
            font-size: 1.8rem;
            font-weight: 700;
            width: 180px;
            text-align: center;
            color: #fff0b5;
            caret-color: #ff66ff;
            border: 2px solid #00ffff;
            box-shadow: 0 0 20px #0ff, inset 0 0 10px #0ff;
            transition: 0.2s;
            outline: none;
        }

        .input-area input:focus {
            border-color: #ff99ff;
            box-shadow: 0 0 30px #ff99ff, inset 0 0 15px #ff99ff;
            transform: scale(1.02);
        }

        /* 庫存面板 */
        .stock-panel {
            background: rgba(8, 20, 40, 0.7);
            border-radius: 48px;
            padding: 24px 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 215, 0, 0.4);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.3), inset 0 0 15px rgba(255, 255, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        .stock-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            color: #ffd966;
            font-size: 1.3rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 8px gold;
        }

        .stock-title span {
            font-size: 0.9rem;
            background: #330066;
            padding: 6px 14px;
            border-radius: 40px;
            border: 1px solid #cc88ff;
            box-shadow: 0 0 12px #cc88ff;
        }

        .coins-stock {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 16px 8px;
        }

        .coin-item {
            flex: 1 0 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0, 255, 255, 0.08);
            border-radius: 36px;
            padding: 14px 0 12px;
            border: 1px solid;
            border-image-slice: 1;
            box-shadow: 0 8px 0 rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(6px);
            transition: transform 0.15s;
        }

        .coin-item[data-coin="50"] { border-color: #f0f; box-shadow: 0 0 18px #f0f, 0 5px 0 #600; }
        .coin-item[data-coin="10"] { border-color: #0ff; box-shadow: 0 0 18px #0ff, 0 5px 0 #036; }
        .coin-item[data-coin="5"] { border-color: #ff0; box-shadow: 0 0 18px #ff0, 0 5px 0 #330; }
        .coin-item[data-coin="1"] { border-color: #bfb; box-shadow: 0 0 18px #bfb, 0 5px 0 #131; }

        .coin-item .denom {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(145deg, #fff, #c0c0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px currentColor;
            line-height: 1;
        }

        .coin-item .stock-control {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 10px 0 5px;
        }

        .stock-control button {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #1a1a3a;
            border: 2px solid cyan;
            color: cyan;
            font-size: 1.6rem;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 0 15px cyan;
            transition: 0.1s;
        }

        .stock-control button:hover {
            background: cyan;
            color: black;
            box-shadow: 0 0 30px cyan;
        }

        .stock-control .stock-value {
            min-width: 45px;
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff2b5;
            text-shadow: 0 0 10px yellow;
        }

        .coin-item .initial-desc {
            font-size: 0.8rem;
            color: #aaa;
        }

        /* 執行按鈕 */
        .action-btn {
            display: flex;
            justify-content: center;
            margin: 35px 0 30px;
        }

        .execute-btn {
            background: #000;
            border: 3px solid #00f0ff;
            color: #00f0ff;
            font-size: 2rem;
            font-weight: 800;
            padding: 18px 65px;
            border-radius: 60px;
            text-transform: uppercase;
            letter-spacing: 8px;
            cursor: pointer;
            box-shadow: 0 0 30px #0ff, inset 0 0 15px #0ff;
            transition: 0.2s;
            background: linear-gradient(145deg, #001122, #000814);
        }

        .execute-btn:hover {
            background: #00f0ff;
            color: #000;
            border-color: #ff00ff;
            box-shadow: 0 0 70px #ff00ff, inset 0 0 20px white;
            transform: scale(1.03);
        }

        /* 結果面板 - 枚數超級亮 */
        .result-panel {
            background: rgba(0, 10, 25, 0.7);
            border-radius: 40px;
            padding: 22px 20px;
            border: 2px solid rgba(255, 80, 255, 0.7);
            box-shadow: 0 0 40px #f0f, inset 0 0 20px #f0f;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .result-header {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px dashed magenta;
            padding-bottom: 12px;
            margin-bottom: 20px;
            color: white;
            font-weight: 600;
        }

        .result-badge {
            background: #ff00c6;
            color: black;
            padding: 5px 18px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 800;
            box-shadow: 0 0 15px #ffb3ff;
        }

        /* ========== 重點：枚數顯示區塊，亮到爆炸 ========== */
        .change-details {
            display: flex;
            justify-content: space-around;
            font-size: 2.2rem;     /* 數字變超大 */
            font-weight: 900;
            flex-wrap: wrap;
            gap: 12px;
        }

        .change-details div {
            background: rgba(0, 0, 0, 0.8);    /* 更暗背景凸顯亮度 */
            padding: 16px 22px;
            border-radius: 48px;
            min-width: 120px;
            text-align: center;
            border: 2px solid #ffffff;
            backdrop-filter: blur(4px);
            color: white;                      /* 強制純白 */
            text-shadow:
                0 0 20px #fff,
                0 0 30px #ff00ff,
                0 0 40px #00ffff,
                0 0 60px #ffff00;              /* 四層光暈，保證亮 */
            box-shadow: 0 0 40px #ff88ff;
        }

        /* 面額小標籤（例如「50元」）也稍微調亮，但保持輔助角色 */
        .change-details div span {
            display: block;
            font-size: 1rem;
            color: #ccc;
            text-shadow: 0 0 8px white;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .global-status {
            margin-top: 20px;
            font-size: 1.6rem;
            text-align: center;
            font-weight: 800;
            letter-spacing: 2px;
            padding: 10px;
            border-radius: 40px;
        }

        .success {
            background: #00a86b33;
            color: #b0ffc0;
            text-shadow: 0 0 20px #00ff88;
            border: 1px solid #00ffaa;
        }

        .fail {
            background: #c0004033;
            color: #ffa0b0;
            text-shadow: 0 0 20px #ff4466;
            border: 1px solid #ff4466;
        }

        .restart-prompt {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
        }

        .restart-prompt button {
            background: transparent;
            border: 2px solid #ffb347;
            color: #ffb347;
            font-size: 1.5rem;
            font-weight: 600;
            padding: 10px 30px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px orange;
            transition: 0.2s;
            backdrop-filter: blur(8px);
        }

        .restart-prompt button:hover {
            background: #ffb347;
            color: black;
            box-shadow: 0 0 45px #ffb347;
            border-color: white;
        }

        .restart-prompt .no-btn {
            border-color: #aaa;
            color: #aaa;
            box-shadow: 0 0 8px #aaa;
        }
        .restart-prompt .no-btn:hover {
            background: #666;
            color: white;
            border-color: white;
        }

        .hidden {
            display: none;
        }

        footer {
            text-align: center;
            color: #7f9fbf;
            margin-top: 16px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
<div class="neon-box" id="app">
    <h1>✦  CYBER 找零  ✦</h1>
    <div class="sub">⚡ 最少硬幣・庫存即時動態 ⚡</div>

    <!-- 金額輸入區 -->
    <div class="input-area">
        <label>總金額</label>
        <input type="number" id="amountInput" value="87" min="0" step="1" placeholder="元">
        <span style="color:#0ff; font-size: 2rem;">💰</span>
    </div>

    <!-- 庫存面板 -->
    <div class="stock-panel">
        <div class="stock-title">
            <span>⚙️ 庫存火控 ⚙️</span>
            <span>⚡ 點擊 ± 調整</span>
        </div>
        <div class="coins-stock" id="stockControls">
            <!-- 由 js 產生 -->
        </div>
    </div>

    <!-- 執行鈕 -->
    <div class="action-btn">
        <button class="execute-btn" id="executeBtn">▶ 執 行</button>
    </div>

    <!-- 結果顯示區 - 枚數保證亮 -->
    <div class="result-panel" id="resultPanel">
        <div class="result-header">
            <span class="result-badge">💸 找零明細</span>
            <span id="changeSummary"></span>
        </div>
        <div class="change-details" id="changeDetails">
            <!-- 數字會超大、超白、超亮 -->
        </div>
        <div class="global-status" id="globalStatus">等待輸入</div>
    </div>

    <!-- 詢問是否繼續 -->
    <div id="restartBox" class="restart-prompt hidden">
        <button id="restartYes">🔥 再來一發</button>
        <button id="restartNo" class="no-btn">❄️ 不玩了</button>
    </div>
    <footer>⚡ 庫存不足自動替補・最少硬幣演算 ⚡</footer>
</div>

<script>
    (function() {
        const DENOMS = [50, 10, 5, 1];
        let stocks = { 50: 5, 10: 5, 5: 5, 1: 5 };

        const amountInput = document.getElementById('amountInput');
        const stockDiv = document.getElementById('stockControls');
        const executeBtn = document.getElementById('executeBtn');
        const changeDetails = document.getElementById('changeDetails');
        const globalStatus = document.getElementById('globalStatus');
        const changeSummary = document.getElementById('changeSummary');
        const restartBox = document.getElementById('restartBox');
        const restartYes = document.getElementById('restartYes');
        const restartNo = document.getElementById('restartNo');

        function renderStocks() {
            let html = '';
            for (let d of DENOMS) {
                html += `
                    <div class="coin-item" data-coin="${d}">
                        <div class="denom">$${d}</div>
                        <div class="stock-control">
                            <button class="stock-dec" data-denom="${d}">−</button>
                            <span class="stock-value" id="stock-${d}">${stocks[d]}</span>
                            <button class="stock-inc" data-denom="${d}">+</button>
                        </div>
                        <div class="initial-desc">庫存</div>
                    </div>
                `;
            }
            stockDiv.innerHTML = html;

            document.querySelectorAll('.stock-dec').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const denom = parseInt(btn.dataset.denom);
                    if (stocks[denom] > 0) {
                        stocks[denom] -= 1;
                        updateStockSpan(denom);
                    } else {
                        alert('庫存不能小於0 🤖');
                    }
                });
            });

            document.querySelectorAll('.stock-inc').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const denom = parseInt(btn.dataset.denom);
                    stocks[denom] += 1;
                    updateStockSpan(denom);
                });
            });
        }

        function updateStockSpan(denom) {
            const span = document.getElementById(`stock-${denom}`);
            if (span) span.innerText = stocks[denom];
        }

        function calculateChange(amount, stockCopy) {
            let remaining = amount;
            let used = { 50:0, 10:0, 5:0, 1:0 };

            for (let d of DENOMS) {
                if (remaining <= 0) break;
                let need = Math.floor(remaining / d);
                let available = stockCopy[d];
                let take = Math.min(need, available);
                used[d] = take;
                remaining -= take * d;
                stockCopy[d] -= take;
            }

            let success = (remaining === 0);
            return { success, used, remaining };
        }

        function runChange() {
            let amount = parseInt(amountInput.value);
            if (isNaN(amount) || amount < 0) amount = 0;
            let stockCopy = { ...stocks };

            const result = calculateChange(amount, stockCopy);

            displayResult(result, amount);

            if (result.success) {
                stocks = { ...stockCopy };
                for (let d of DENOMS) {
                    updateStockSpan(d);
                }
            }

            restartBox.classList.remove('hidden');
        }

        // 顯示結果，枚數區塊保證超亮
        function displayResult(result, amount) {
            const { success, used, remaining } = result;
            let detailsHtml = '';
            for (let d of DENOMS) {
                detailsHtml += `<div><span>${d} 元</span> ${used[d]} 枚</div>`;
            }
            changeDetails.innerHTML = detailsHtml;

            if (success) {
                globalStatus.innerText = '✅ 找零成功！ 硬幣閃亮發放';
                globalStatus.className = 'global-status success';
                changeSummary.innerText = `💰 總額 ${amount} 元`;
            } else {
                globalStatus.innerText = `❌ 庫存不足，尚缺 ${remaining} 元 (已自動調配)`;
                globalStatus.className = 'global-status fail';
                changeSummary.innerText = `⚠️ 無法完整找零`;
            }
        }

        function restartSystem() {
            stocks = { 50: 5, 10: 5, 5: 5, 1: 5 };
            for (let d of DENOMS) {
                updateStockSpan(d);
            }
            changeDetails.innerHTML = `<div><span>50元</span> 0 枚</div><div><span>10元</span> 0 枚</div><div><span>5元</span> 0 枚</div><div><span>1元</span> 0 枚</div>`;
            globalStatus.innerText = '🔄 已重置，等待輸入';
            globalStatus.className = 'global-status';
            changeSummary.innerText = '';
            restartBox.classList.add('hidden');
            amountInput.value = 87;
        }

        function ignoreRestart() {
            restartBox.classList.add('hidden');
            globalStatus.innerText = '⏸️ 已暫停，可再執行';
        }

        executeBtn.addEventListener('click', runChange);
        amountInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                runChange();
            }
        });

        restartYes.addEventListener('click', restartSystem);
        restartNo.addEventListener('click', ignoreRestart);

        renderStocks();
        // 初始顯示
        changeDetails.innerHTML = `<div><span>50元</span> 0 枚</div><div><span>10元</span> 0 枚</div><div><span>5元</span> 0 枚</div><div><span>1元</span> 0 枚</div>`;
        globalStatus.innerText = '⚡ 輸入金額後執行 ⚡';

        // 點擊加減或輸入時關閉重啟框
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('stock-inc') || e.target.classList.contains('stock-dec')) {
                restartBox.classList.add('hidden');
            }
        });
        amountInput.addEventListener('focus', () => {
            restartBox.classList.add('hidden');
        });
    })();
</script>
</body>
</html>
